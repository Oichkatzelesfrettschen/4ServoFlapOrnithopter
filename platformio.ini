; PlatformIO Project Configuration File
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
; Please visit documentation for other options:
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = pro_mini_5v
description = Advanced 4-Servo Flapping Ornithopter Control System

; ============================================
; Common settings for all environments
; ============================================
[env]
framework = arduino
build_flags =
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DVERSION=2.1.0
    -DPROJECT_NAME=\"4ServoFlapOrnithopter\"
lib_deps =
    Wire
    SPI
test_framework = unity
monitor_speed = 9600
upload_speed = 57600
check_tool = cppcheck, clangtidy
check_flags =
    cppcheck: --enable=all --suppress=missingIncludeSystem
    clangtidy: --checks=-*,clang-analyzer-*,bugprone-*

; ============================================
; Arduino Pro Mini 5V 16MHz (Production)
; ============================================
[env:pro_mini_5v]
platform = atmelavr
board = pro16MHzatmega328
build_flags =
    ${env.build_flags}
    -DBOARD_PRO_MINI_5V
    -DCLOCK_SPEED=16000000L
    -O2
lib_deps =
    ${env.lib_deps}

; ============================================
; Arduino Pro Mini 3.3V 8MHz
; ============================================
[env:pro_mini_3v3]
platform = atmelavr
board = pro8MHzatmega328
build_flags =
    ${env.build_flags}
    -DBOARD_PRO_MINI_3V3
    -DCLOCK_SPEED=8000000L
    -O2
lib_deps =
    ${env.lib_deps}

; ============================================
; Native environment for unit testing on PC
; ============================================
[env:native]
platform = native
build_flags =
    ${env.build_flags}
    -std=c++11
    -DUNIT_TEST
    -DNATIVE_BUILD
test_build_project_src = false

; ============================================
; Development/Debug configuration
; ============================================
[env:debug]
platform = atmelavr
board = pro16MHzatmega328
build_type = debug
build_flags =
    ${env.build_flags}
    -DDEBUG
    -DENABLE_SERIAL_DEBUG
    -DVERBOSE_LOGGING
    -g
    -O0
lib_deps =
    ${env.lib_deps}
debug_tool = simavr
debug_init_break = tbreak setup

; ============================================
; Production/Release configuration
; ============================================
[env:release]
platform = atmelavr
board = pro16MHzatmega328
build_flags =
    ${env.build_flags}
    -O3
    -DNDEBUG
    -flto
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
lib_ldf_mode = deep+
lib_deps =
    ${env.lib_deps}

; ============================================
; With IMU sensor support (MPU6050)
; ============================================
[env:with_imu]
platform = atmelavr
board = pro16MHzatmega328
build_flags =
    ${env.build_flags}
    -DENABLE_IMU
    -DIMU_MPU6050
    -O2
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit BusIO@^1.14.1
    adafruit/Adafruit Unified Sensor@^1.1.7

; ============================================
; With barometric pressure sensor (BMP280)
; ============================================
[env:with_baro]
platform = atmelavr
board = pro16MHzatmega328
build_flags =
    ${env.build_flags}
    -DENABLE_BAROMETER
    -DBARO_BMP280
    -O2
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit BMP280 Library@^2.6.6
    adafruit/Adafruit BusIO@^1.14.1
    adafruit/Adafruit Unified Sensor@^1.1.7

; ============================================
; With full sensor suite
; ============================================
[env:full_sensors]
platform = atmelavr
board = pro16MHzatmega328
build_flags =
    ${env.build_flags}
    -DENABLE_IMU
    -DENABLE_BAROMETER
    -DENABLE_MAGNETOMETER
    -DIMU_MPU6050
    -DBARO_BMP280
    -DMAG_HMC5883
    -O2
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit BMP280 Library@^2.6.6
    adafruit/Adafruit HMC5883 Unified@^1.2.1
    adafruit/Adafruit Unified Sensor@^1.1.7
    adafruit/Adafruit BusIO@^1.14.1

; ============================================
; With ML support (Neural Network)
; ============================================
[env:with_ml]
platform = atmelavr
board = pro16MHzatmega328
build_flags =
    ${env.build_flags}
    -DENABLE_ML
    -DMLP_INFERENCE
    -O2
lib_deps =
    ${env.lib_deps}

; ============================================
; ESP32 variant (future enhancement)
; ============================================
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    ${env.build_flags}
    -DESP32
    -DENABLE_IMU
    -DENABLE_WIFI
    -DENABLE_OTA
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit BMP280 Library@^2.6.6

; ============================================
; Custom scripts
; ============================================
extra_scripts =
    pre:scripts/version.py
    post:scripts/custom_build.py
